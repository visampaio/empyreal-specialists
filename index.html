<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empyreal Specialists App</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="startDiv">
        <label for="numPlayers">Select number of players:</label>
        <select name="numPlayers" id="numPlayers">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
        <button id="startGame">Start</button>
    </div>

    <div id="specialistList">
        <div id="engineerList" class="cardDisplay"></div>
        <div id="surveyorList" class="cardDisplay"></div>
        <div id="stationMasterList" class="cardDisplay"></div>
    </div>

    <div id="modal">
        <div class="modalContent">
            <p>Do you want to select this character?</p>
            <button id="selectYes" data-target="">Yes</button>
            <button id="selectNo">No</button>
        </div>
    </div>

    <script src="specialist.js"></script>
    <script src="setup.js"></script>
  </body>
</html>
